<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sky Enterprises | Premium Billing</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

	<style>
		:root {
			--primary: #0f172a;
			--accent: #2563eb;
			--success: #16a34a;
			--bg: #f1f5f9;
		}

		* {
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {
			margin: 0;
			background: var(--bg);
			display: flex;
			color: #334155;
			height: 100vh;
			overflow: hidden;
		}

		/* Sidebar */
		.sidebar {
			width: 260px;
			background: var(--primary);
			color: white;
			padding: 25px;
			flex-shrink: 0;
		}

			.sidebar h2 {
				font-size: 1.4rem;
				color: #38bdf8;
				margin-bottom: 30px;
				border-bottom: 1px solid #334155;
				padding-bottom: 10px;
			}

		.nav-item {
			padding: 12px;
			cursor: pointer;
			border-radius: 8px;
			transition: 0.3s;
			margin-bottom: 10px;
			color: #94a3b8;
			display: block;
			text-decoration: none;
		}

			.nav-item:hover, .nav-item.active {
				background: #1e293b;
				color: white;
			}

		/* Main Area */
		.main {
			flex-grow: 1;
			padding: 40px;
			overflow-y: auto;
		}

		.card {
			background: white;
			padding: 25px;
			border-radius: 15px;
			box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
			margin-bottom: 30px;
			border: 1px solid #e2e8f0;
		}

		.grid-3 {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 20px;
			margin-bottom: 20px;
		}

		label {
			display: block;
			font-weight: 600;
			margin-bottom: 5px;
			font-size: 0.9rem;
		}

		input, select {
			width: 100%;
			padding: 12px;
			border: 1px solid #cbd5e1;
			border-radius: 8px;
			font-size: 1rem;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
		}

		th {
			background: #f8fafc;
			padding: 15px;
			text-align: left;
			border-bottom: 2px solid #e2e8f0;
		}

		td {
			padding: 15px;
			border-bottom: 1px solid #f1f5f9;
		}

		.btn {
			padding: 12px 25px;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			font-weight: 600;
			transition: 0.3s;
		}

		.btn-add {
			background: var(--accent);
			color: white;
			width: 100%;
		}

		.btn-save {
			background: var(--success);
			color: white;
			width: 100%;
			margin-top: 20px;
			font-size: 1.1rem;
		}

		.btn-delete {
			background: #fee2e2;
			color: #ef4444;
			border: none;
			padding: 5px 10px;
			border-radius: 5px;
			cursor: pointer;
		}
	</style>
</head>
<body>

	<div class="sidebar">
		<h2>SKY ENTERPRISES</h2>
		<div id="nav-dash" class="nav-item active" onclick="showPage('dashboard')">🏠 Dashboard</div>
		<div id="nav-bill" class="nav-item" onclick="showPage('billing')">📝 New Invoice</div>
		<a class="nav-item" href="https://docs.google.com/spreadsheets/d/1dW4H598iT_akv-4K1M-oGevIrqpuQ4XWlCH6E-OvyBInLXlIu4VFqa7iHpfS8ro/edit" target="_blank">📂 View Database</a>
	</div>

	<div class="main">
		<div id="dashboard-page">
			<h1>Welcome, Karthik!</h1>
			<p>Sky Enterprises Billing Dashboard</p>
			<div style="display: flex; gap: 20px;">
				<div class="card" style="flex: 1; border-left: 5px solid var(--accent);">
					<h3>Status</h3>
					<p>System is Live & Connected to Google Sheets</p>
				</div>
			</div>
		</div>

		<div id="billing-page" style="display:none">
			<h1>Create New Invoice</h1>
			<div class="card">
				<h3>Customer Details</h3>
				<div class="grid-3">
					<div><label>Name</label><input type="text" id="custName"></div>
					<div><label>Phone</label><input type="text" id="custPhone"></div>
					<div><label>Address</label><input type="text" id="custAddress"></div>
				</div>
			</div>

			<div class="card">
				<h3>Material Selection</h3>
				<div class="grid-3">
					<div>
						<label>Product</label>
						<select id="prodSelect" onchange="updatePrice()">
							<option value="">-- Select --</option>
							<option value="1200">M-Sand</option>
							<option value="1300">P-Sand</option>
							<option value="1100">20mm Andhra</option>
							<option value="1300">20mm Tamil Nadu</option>
							<option value="850">Dust</option>
							<option value="900">GSB</option>
							<option value="950">40mm Jelly</option>
							<option value="500">Weight Less Brick Dust</option>
						</select>
					</div>
					<div><label>Rate</label><input type="number" id="rate"></div>
					<div><label>Quantity</label><input type="number" id="qty"></div>
				</div>
				<button class="btn btn-add" onclick="addItem()">+ Add to List</button>
			</div>

			<div class="card">
				<table id="itemTable">
					<thead><tr><th>Material</th><th>Qty</th><th>Rate</th><th>Total</th><th>Action</th></tr></thead>
					<tbody></tbody>
				</table>
				<div style="text-align: right; margin-top: 20px;">
					<label><input type="checkbox" id="gstCheck" onchange="calculateGrandTotal()"> Apply GST (18%)</label>
					<h2 id="grandTotalText">Grand Total: ₹ 0.00</h2>
					<button class="btn btn-save" onclick="processInvoice()">📥 Save & Download PDF</button>
				</div>
			</div>
		</div>
	</div>

	<script>
		// UPDATED URL
		const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrUFRoPYWj-ENGrY7LOKUhtrkFjvjbOD0UkY41woPSAaZSTpn0eeXVPRKm15fKbJ7Q/exec";
		let cart = [];
		let grandTotal = 0;

		function showPage(page) {
			document.getElementById('dashboard-page').style.display = page === 'dashboard' ? 'block' : 'none';
			document.getElementById('billing-page').style.display = page === 'billing' ? 'block' : 'none';
			document.getElementById('nav-dash').classList.toggle('active', page === 'dashboard');
			document.getElementById('nav-bill').classList.toggle('active', page === 'billing');
		}

		function updatePrice() {
			document.getElementById('rate').value = document.getElementById('prodSelect').value;
		}

		function addItem() {
			const prod = document.getElementById('prodSelect');
			const rate = parseFloat(document.getElementById('rate').value);
			const qty = parseFloat(document.getElementById('qty').value);
			if (!prod.value || !qty) return alert("Details fill pannu machi!");

			cart.push({ name: prod.options[prod.selectedIndex].text, rate, qty, total: rate * qty });
			renderTable();
			document.getElementById('qty').value = "";
		}

		function renderTable() {
			const tbody = document.querySelector("#itemTable tbody");
			tbody.innerHTML = cart.map((item, i) => `
				<tr><td>${item.name}</td><td>${item.qty}</td><td>₹${item.rate}</td><td>₹${item.total}</td>
				<td><button class="btn-delete" onclick="cart.splice(${i},1);renderTable()">Remove</button></td></tr>
			`).join('');
			calculateGrandTotal();
		}

		function calculateGrandTotal() {
			let subtotal = cart.reduce((sum, item) => sum + item.total, 0);
			grandTotal = document.getElementById('gstCheck').checked ? subtotal * 1.18 : subtotal;
			document.getElementById('grandTotalText').innerText = `Grand Total: ₹ ${grandTotal.toLocaleString('en-IN')}`;
		}

		async function processInvoice() {
			if (cart.length === 0) return alert("Cart empty-ah iruku!");

			const invoiceData = {
				invoiceId: "SKY-" + Date.now().toString().slice(-6),
				customerName: document.getElementById('custName').value || "Cash Customer",
				phone: document.getElementById('custPhone').value || "N/A",
				total: grandTotal.toFixed(2),
				gst: document.getElementById('gstCheck').checked ? (grandTotal * 0.18/1.18).toFixed(2) : 0,
				items: cart.map(i => `${i.name}(${i.qty})`).join(", ")
			};

			// SAVE TO SHEET - WITH REDIRECT LOGIC
			try {
				await fetch(SCRIPT_URL, {
					method: 'POST',
					mode: 'no-cors',
					cache: 'no-cache',
					redirect: 'follow',
					body: JSON.stringify(invoiceData),
					headers: { 'Content-Type': 'text/plain' }
				});
				console.log("Data pushed to sheet");
			} catch (e) { console.error("Sheet Error:", e); }

			// GENERATE PDF
			const { jsPDF } = window.jspdf;
			const doc = new jsPDF();
			doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
			doc.setTextColor(255); doc.setFontSize(24); doc.text("SKY ENTERPRISES", 14, 20);
			doc.setFontSize(10); doc.text("Site Material Suppliers", 14, 30);

			doc.setTextColor(40); doc.text(`Bill To: ${invoiceData.customerName}`, 14, 50);
			doc.text(`Invoice ID: ${invoiceData.invoiceId}`, 14, 60);

			doc.autoTable({
				startY: 70,
				head: [['Item', 'Qty', 'Rate', 'Total']],
				body: cart.map(i => [i.name, i.qty, i.rate, i.total]),
				theme: 'grid', headStyles: { fillColor: [37, 99, 235] }
			});

			doc.text(`Grand Total: Rs. ${grandTotal.toLocaleString('en-IN')}`, 140, doc.lastAutoTable.finalY + 15);
			doc.save(`${invoiceData.invoiceId}.pdf`);

			alert("Invoice Saved & Downloaded!");
			location.reload();
		}
	</script>
</body>
</html>
